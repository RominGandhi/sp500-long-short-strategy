name: Quarterly S&P 500 Data Update

on:
  schedule:
    # 8 AM UTC on the 2nd day of Jan, Apr, Jul, Oct
    - cron: "0 8 2 1,4,7,10 *"

  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SIMFIN_API_KEY:       ${{ secrets.SIMFIN_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pandas<2.2" yfinance requests lxml html5lib beautifulsoup4 simfin supabase python-dotenv numpy

      - name: Pull new quarter prices
        run: python data_pipeline.py --update

      - name: Rebuild point-in-time universe
        run: python universe.py

      - name: Refresh fundamentals
        run: python fundamentals.py --simfin-key $SIMFIN_API_KEY

      - name: Wake up Supabase (free tier pauses after inactivity)
        run: |
          python -c "
          import requests, os, time
          url = os.environ['SUPABASE_URL'] + '/rest/v1/prices?select=date&limit=1'
          key = os.environ['SUPABASE_SERVICE_KEY']
          headers = {'apikey': key, 'Authorization': 'Bearer ' + key}
          for i in range(24):          # wait up to 2 minutes
              r = requests.get(url, headers=headers, timeout=15)
              if r.status_code == 200:
                  print(f'Supabase ready after {i*5}s')
                  break
              print(f'Waiting for DB to wake up... ({i*5}s)')
              time.sleep(5)
          else:
              raise RuntimeError('Supabase did not wake up in time')
          "

      - name: Push new data to Supabase
        run: python migrate.py --quarter

      - name: Commit CSVs to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No new data to commit" && exit 0
          QUARTER=$(python -c "
          import pandas as pd
          from datetime import date
          t = pd.Timestamp(date.today())
          p = t.to_period('Q')
          print(f\"{p.year}_Q{p.quarter}\")
          ")
          git commit -m "data: add $QUARTER S&P 500 data"
          git push
