name: Quarterly S&P 500 Data Update

on:
  schedule:
    # 8 AM UTC on the 2nd day of Jan, Apr, Jul, Oct
    - cron: "0 8 2 1,4,7,10 *"

  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pandas<2.2" yfinance requests lxml html5lib beautifulsoup4 psycopg2-binary sqlalchemy python-dotenv numpy

      - name: Pull new quarter prices
        run: python data_preprocessing/data_pipeline.py --update

      - name: Rebuild point-in-time universe
        run: python data_preprocessing/universe.py

      - name: Refresh SEC fundamentals
        run: python data_preprocessing/sec_fundamentals.py

      - name: Refresh shares outstanding
        run: python data_preprocessing/yfinance_shares.py

      - name: Push prices to Neon
        run: python database/migrate.py

      - name: Regenerate factor scores
        run: python signals/factors.py

      - name: Commit data and signals to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ signals/
          git diff --cached --quiet && echo "No new data to commit" && exit 0
          QUARTER=$(python -c "
          import pandas as pd
          from datetime import date
          t = pd.Timestamp(date.today())
          p = t.to_period('Q')
          print(f\"{p.year}_Q{p.quarter}\")
          ")
          git commit -m "data: add $QUARTER S&P 500 data"
          git push
